// ═══ SUPABASE UPLOAD ═══════════════════════════════════════════
async function sbUpload(sbUrl, sbKey, file, carId, type) {
  const path = `${carId}/${type}-${Date.now()}-${encodeURIComponent(file.name)}`;
  const res = await fetch(`${sbUrl}/storage/v1/object/premier-media/${path}`, {
    method: "POST",
    headers: { "Authorization": `Bearer ${sbKey}`, "Content-Type": file.type, "x-upsert": "true" },
    body: file,
  });
  if (!res.ok) { const e = await res.json(); throw new Error(e.message || "Upload falhou"); }
  return { url: `${sbUrl}/storage/v1/object/public/premier-media/${path}`, name: file.name, type, uploadedAt: new Date().toISOString() };
}

// ═══ UI ═════════════════════════════════════════════════════════
function Btn({children,onClick,style:s,variant="primary",small,disabled}){
  const V={primary:{background:C.red,color:"#fff"},ghost:{background:"transparent",color:C.textMuted,border:`1px solid ${C.border}`},danger:{background:"#7F1D1D",color:"#FCA5A5",border:`1px solid #DC262633`},success:{background:"#064E3B",color:"#6EE7B7",border:`1px solid #10B98155`},info:{background:"#1E3A5F",color:"#93C5FD",border:`1px solid #3B82F633`}};
  return <button onClick={disabled?undefined:onClick} style={{padding:small?"5px 12px":"9px 18px",borderRadius:7,border:"none",cursor:disabled?"not-allowed":"pointer",fontFamily:"inherit",fontSize:small?11:13,fontWeight:600,transition:"all 0.15s",display:"inline-flex",alignItems:"center",gap:5,letterSpacing:.3,opacity:disabled?.5:1,...V[variant],...s}}>{children}</button>;
}
function Badge({label,col}){return <span style={{background:col+"22",color:col,border:`1px solid ${col}55`,borderRadius:20,padding:"2px 10px",fontSize:10,fontWeight:700,letterSpacing:.5,whiteSpace:"nowrap"}}>{label}</span>;}
function Inp({label,value,onChange,type="text",placeholder,disabled}){
  return(<div style={{display:"flex",flexDirection:"column",gap:4}}>
    {label&&<label style={{fontSize:10,color:C.textMuted,fontWeight:600,letterSpacing:.8,textTransform:"uppercase"}}>{label}</label>}
    <input type={type} value={value||""} onChange={e=>onChange(e.target.value)} placeholder={placeholder} disabled={disabled}
      style={{background:"#040406",border:`1px solid ${C.border}`,borderRadius:7,padding:"9px 11px",color:C.text,fontSize:13,fontFamily:"inherit",outline:"none",width:"100%",opacity:disabled?.5:1}}
      onFocus={e=>e.target.style.borderColor=C.red} onBlur={e=>e.target.style.borderColor=C.border}/>
  </div>);
}
function Sel({label,value,onChange,options}){
  return(<div style={{display:"flex",flexDirection:"column",gap:4}}>
    {label&&<label style={{fontSize:10,color:C.textMuted,fontWeight:600,letterSpacing:.8,textTransform:"uppercase"}}>{label}</label>}
    <select value={value||""} onChange={e=>onChange(e.target.value)}
      style={{background:"#040406",border:`1px solid ${C.border}`,borderRadius:7,padding:"9px 11px",color:value?C.text:C.textMuted,fontSize:13,fontFamily:"inherit",outline:"none",width:"100%",cursor:"pointer"}}
      onFocus={e=>e.target.style.borderColor=C.red} onBlur={e=>e.target.style.borderColor=C.border}>
      {options.map(o=><option key={o.v||o} value={o.v||o} style={{background:C.card,color:C.text}}>{o.l||o}</option>)}
    </select>
  </div>);
}
function Txta({label,value,onChange,rows=3,placeholder}){
  return(<div style={{display:"flex",flexDirection:"column",gap:4}}>
    {label&&<label style={{fontSize:10,color:C.textMuted,fontWeight:600,letterSpacing:.8,textTransform:"uppercase"}}>{label}</label>}
    <textarea value={value||""} onChange={e=>onChange(e.target.value)} rows={rows} placeholder={placeholder}
      style={{background:"#040406",border:`1px solid ${C.border}`,borderRadius:7,padding:"9px 11px",color:C.text,fontSize:13,fontFamily:"inherit",outline:"none",width:"100%",resize:"vertical"}}
      onFocus={e=>e.target.style.borderColor=C.red} onBlur={e=>e.target.style.borderColor=C.border}/>
  </div>);
}
function Modal({title,onClose,children,width=640}){
  return(
    <div style={{position:"fixed",inset:0,background:"#000c",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center",padding:20}} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,width:"100%",maxWidth:width,maxHeight:"90vh",overflow:"auto",boxShadow:"0 24px 60px #000a"}}>
        <div style={{padding:"18px 22px",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,background:C.card,zIndex:10}}>
          <div style={{fontWeight:700,fontSize:15,color:C.red}}>{title}</div>
          <button onClick={onClose} style={{background:"none",border:"none",color:C.textMuted,cursor:"pointer",fontSize:20,lineHeight:1}}>✕</button>
        </div>
        <div style={{padding:22}}>{children}</div>
      </div>
    </div>
  );
}

// ═══ SETUP ══════════════════════════════════════════════════════
function SetupScreen({onSave,onBack}){
  const [url,setUrl]=useState(""); const [key,setKey]=useState(""); const [err,setErr]=useState(""); const [testing,setTesting]=useState(false);
  useEffect(()=>{
    async function load(){try{const d=await window.storage.get("premier_sb_draft");if(d){const p=JSON.parse(d.value);setUrl(p.url||"");setKey(p.key||"");}}catch{}}
    load();
  },[]);
  async function upUrl(v){setUrl(v);try{await window.storage.set("premier_sb_draft",JSON.stringify({url:v,key}));}catch{}}
  async function upKey(v){setKey(v);try{await window.storage.set("premier_sb_draft",JSON.stringify({url,key:v}));}catch{}}
  async function handle(){
    if(!url.trim()||!key.trim()){setErr("Preencha os dois campos.");return;}
    if(!url.trim().startsWith("https")){setErr("URL inválida. Deve começar com https://");return;}
    try{await window.storage.delete("premier_sb_draft");}catch{}
    onSave({url:url.trim().replace(/\/+$/,""),key:key.trim()});
  }
  return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
      <div style={{width:"100%",maxWidth:520}}>
        <div style={{textAlign:"center",marginBottom:36}}>
          <img src={LOGO} alt="Premier" style={{width:200,objectFit:"contain"}}/>
          <div style={{marginTop:14,fontSize:17,fontWeight:700,color:C.text}}>Configuração do Supabase</div>
          <div style={{marginTop:6,fontSize:12,color:C.textMuted}}>Para ativar upload de fotos e vídeos</div>
        </div>
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:30,display:"flex",flexDirection:"column",gap:18}}>
          <div style={{background:"#1a1000",border:`1px solid ${C.warning}44`,borderRadius:9,padding:13,fontSize:12,color:C.warning,lineHeight:1.8}}>
            <b style={{display:"block",marginBottom:4}}>📋 Antes de configurar:</b>
            <div>1. No Supabase → <b style={{color:C.text}}>Armazenamento</b> → clique em <b style={{color:C.text}}>Novo bucket</b></div>
            <div>2. Nome do bucket: <b style={{color:C.text}}>premier-media</b> → marque <b style={{color:C.text}}>Bucket público</b></div>
            <div>3. Vá em <b style={{color:C.text}}>Configurações do projeto → API</b> e copie as credenciais abaixo</div>
          </div>
          <Inp label="URL do projeto" value={url} onChange={upUrl} placeholder="https://xxxxxxxx.supabase.co"/>
          <Inp label="Chave publicável (anon)" value={key} onChange={upKey} placeholder="eyJhbGci..."/>
          {err&&<div style={{color:C.error,fontSize:12,background:"#7F1D1D22",border:`1px solid ${C.error}33`,borderRadius:7,padding:"8px 11px"}}>{err}</div>}
          <div style={{display:"flex",gap:10}}>
            {onBack&&<Btn onClick={onBack} variant="ghost" style={{flex:1,justifyContent:"center"}}>Voltar</Btn>}
            <Btn onClick={handle}  style={{flex:2,justifyContent:"center"}}>"✓ Salvar e Ativar"</Btn>
          </div>
        </div>
      </div>
    </div>
  );
}

// ═══ LOGIN ══════════════════════════════════════════════════════
function LoginScreen({onLogin}){
  const [u,setU]=useState(""); const [p,setP]=useState(""); const [err,setErr]=useState("");
  function handle(){
    const c=CRED[u.toLowerCase().trim()];
    if(c&&c.pass===p) onLogin({username:u,...c}); else setErr("Usuário ou senha inválidos");
  }
  return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
      <div style={{width:"100%",maxWidth:400}}>
        <div style={{textAlign:"center",marginBottom:34}}>
          <img src={LOGO} alt="Premier Multimarcas" style={{width:230,objectFit:"contain",filter:"drop-shadow(0 4px 20px rgba(204,26,26,.35))"}}/>
          <div style={{color:C.textMuted,fontSize:10,letterSpacing:4,marginTop:8,textTransform:"uppercase"}}>Gestão de Veículos</div>
          <div style={{width:50,height:2,background:`linear-gradient(90deg,transparent,${C.red},transparent)`,margin:"10px auto 0"}}/>
        </div>
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:32,display:"flex",flexDirection:"column",gap:18,boxShadow:"0 24px 60px #000a"}}>
          <Inp label="Usuário" value={u} onChange={setU} placeholder="proprietario / gerente / preparacao / funcionario"/>
          <Inp label="Senha" value={p} onChange={setP} type="password" placeholder="••••••••"/>
          {err&&<div style={{color:C.error,fontSize:12,textAlign:"center",background:"#7F1D1D22",border:`1px solid #DC262633`,borderRadius:7,padding:"7px 11px"}}>{err}</div>}
          <Btn onClick={handle} style={{width:"100%",justifyContent:"center",padding:"12px 18px"}}>Entrar</Btn>
        </div>
        <div style={{marginTop:14,background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:13,fontSize:11,color:C.textMuted,lineHeight:2}}>
          <div style={{color:C.textDim,fontWeight:700,fontSize:9,letterSpacing:1,marginBottom:4}}>ACESSOS DEMO — SENHA: premier123</div>
          {Object.entries(ROLE_LABEL).map(([k,v])=><div key={k}>{v}: <b style={{color:C.text}}>{k}</b></div>)}
        </div>
      </div>
    </div>
  );
}

// ═══ DASHBOARD ══════════════════════════════════════════════════
function Dashboard({cars,suppliers,user,onLogout,onSelectCar,onAddCar,onOpenSuppliers,onOpenSetup,sbConfig}){
  const [search,setSearch]=useState(""); const [fStatus,setFStatus]=useState("Todos"); const [fOrigem,setFOrigem]=useState("Todas");
  const fil=cars.filter(c=>(fStatus==="Todos"||c.status===fStatus)&&(fOrigem==="Todas"||c.origem===fOrigem)&&((c.name||"").toLowerCase().includes(search.toLowerCase())||(c.plate||"").toLowerCase().includes(search.toLowerCase())));
  let lucroTotal=0;
  if(CAN.financial(user.role)) cars.filter(c=>c.status==="Vendido").forEach(c=>{
    const pv=Number(c.precoVenda)||0; const vp=c.origem==="Consignado"?Number(c.consignadoValor)||0:Number(c.valorPago)||0;
    const desp=(c.despesas||[]).reduce((s,d)=>s+(Number(d.valor)||0),0); const com=Number(c.comissaoValor)||0;
    lucroTotal+=pv-vp-desp-com;
  });
  const stats=[
    {l:"Total",v:cars.length,col:C.red,icon:"🚗"},
    {l:"Em Prep.",v:cars.filter(c=>c.status==="Em Preparação").length,col:"#3B82F6",icon:"🔧"},
    {l:"Aguard. Aprov.",v:cars.filter(c=>c.status==="Aguardando Aprovação").length,col:"#F59E0B",icon:"⏳"},
    {l:"Prontos",v:cars.filter(c=>c.status==="Pronto para Venda").length,col:"#10B981",icon:"✅"},
    {l:"Vendidos",v:cars.filter(c=>c.status==="Vendido").length,col:"#8B5CF6",icon:"🤝"},
  ];
  return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column"}}>
      <header style={{background:C.card,borderBottom:`1px solid ${C.border}`,padding:"11px 18px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:100}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <img src={LOGO} alt="Premier" style={{height:42,objectFit:"contain"}}/>
          <div style={{width:1,height:30,background:C.border}}/>
          <div style={{fontSize:11,color:C.textMuted,letterSpacing:1}}>Painel de Controle</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:9}}>
          {!sbConfig&&CAN.setupSb(user.role)&&<button onClick={onOpenSetup} style={{background:"#1a1000",border:`1px solid ${C.warning}66`,borderRadius:6,padding:"5px 10px",color:C.warning,fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>⚠️ Configurar Supabase</button>}
          {CAN.suppliers(user.role)&&<Btn onClick={onOpenSuppliers} variant="ghost" small>🏢 Fornecedores</Btn>}
          {CAN.setupSb(user.role)&&<Btn onClick={onOpenSetup} variant="ghost" small>⚙️</Btn>}
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:12,color:C.text,fontWeight:600}}>{user.name}</div>
            <div style={{fontSize:9,color:C.red,letterSpacing:.5}}>{ROLE_LABEL[user.role]}</div>
          </div>
          <Btn onClick={onLogout} variant="ghost" small>Sair</Btn>
        </div>
      </header>
      <div style={{padding:18,flex:1,maxWidth:1400,margin:"0 auto",width:"100%"}}>
        <div style={{display:"grid",gridTemplateColumns:`repeat(${CAN.financial(user.role)?6:5},1fr)`,gap:10,marginBottom:18}}>
          {stats.map(s=>(
            <div key={s.l} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:11,padding:"14px 16px",display:"flex",alignItems:"center",gap:10}}>
              <div style={{fontSize:22}}>{s.icon}</div>
              <div><div style={{fontSize:24,fontWeight:800,color:s.col,lineHeight:1}}>{s.v}</div><div style={{fontSize:10,color:C.textMuted,marginTop:3}}>{s.l}</div></div>
            </div>
          ))}
          {CAN.financial(user.role)&&(
            <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:11,padding:"14px 16px",display:"flex",alignItems:"center",gap:10}}>
              <div style={{fontSize:22}}>📈</div>
              <div><div style={{fontSize:16,fontWeight:800,color:lucroTotal>=0?C.success:C.error,lineHeight:1}}>{fmt(lucroTotal)}</div><div style={{fontSize:10,color:C.textMuted,marginTop:3}}>Lucro total</div></div>
            </div>
          )}
        </div>
        <div style={{display:"flex",gap:9,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
          <input placeholder="🔍  Nome ou placa..." value={search} onChange={e=>setSearch(e.target.value)}
            style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:7,padding:"8px 13px",color:C.text,fontSize:13,fontFamily:"inherit",outline:"none",flex:1,minWidth:180}}/>
          <select value={fOrigem} onChange={e=>setFOrigem(e.target.value)} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:7,padding:"8px 12px",color:C.textMuted,fontSize:12,fontFamily:"inherit",outline:"none",cursor:"pointer"}}>
            {["Todas",...ORIGENS].map(o=><option key={o}>{o}</option>)}
          </select>
          <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
            {["Todos",...STATUSES].map(s=>(
              <button key={s} onClick={()=>setFStatus(s)} style={{padding:"6px 11px",borderRadius:7,border:`1px solid ${fStatus===s?C.red:C.border}`,background:fStatus===s?C.red+"18":"transparent",color:fStatus===s?C.red:C.textMuted,cursor:"pointer",fontSize:11,fontFamily:"inherit",fontWeight:fStatus===s?700:400,transition:"all .15s"}}>{s}</button>
            ))}
          </div>
          <Btn onClick={onAddCar}>+ Novo Veículo</Btn>
        </div>
        {fil.length===0?(
          <div style={{textAlign:"center",padding:"60px 0",color:C.textMuted}}><div style={{fontSize:44}}>🚗</div><div style={{marginTop:10,fontSize:16}}>Nenhum veículo encontrado</div></div>
        ):(
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(290px,1fr))",gap:12}}>
            {fil.map(car=><CarCard key={car.id} car={car} user={user} onClick={()=>onSelectCar(car)}/>)}
          </div>
        )}
      </div>
    </div>
  );
}

// ═══ CAR CARD ═══════════════════════════════════════════════════
function CarCard({car,user,onClick}){
  const [hov,setHov]=useState(false);
  let total=0,done=0;
  Object.keys(CATS).forEach(k=>{ if(car[k]) car[k].items.forEach(i=>{total++;if(i.status==="concluído")done++;}); });
  const pct=total>0?Math.round((done/total)*100):0;
  const days=daysSince(car.createdAt);
  const dc=car.status==="Vendido"?C.textDim:dayColor(days);
  const OI={"Pessoa Física":"👤","Leilão":"🔨","Consignado":"🤝"};
  return(
    <div onClick={onClick} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}

// ═══ MEDIA TAB ══════════════════════════════════════════════════
function MediaTab({car,user,sbConfig,onChange}){
  const [upl,setUpl]=useState(false); const [prog,setProg]=useState(0); const [err,setErr]=useState(""); const [lb,setLb]=useState(null);
  const pRef=useRef(); const vRef=useRef();
  const hasSb=sbConfig?.url&&sbConfig?.key;
  async function handleUpload(files,type){
    if(!hasSb){setErr("Configure o Supabase primeiro (botão ⚙️ no topo).");return;}
    setUpl(true);setErr("");setProg(0);
    const done=[];
    for(let i=0;i<files.length;i++){
      try{
        const f=files[i]; const res=await sbUpload(sbConfig.url,sbConfig.key,f,car.id,type);
        done.push({...res,uploadedBy:user.name}); setProg(Math.round(((i+1)/files.length)*100));
      }catch(e){setErr(e.message);}
    }
    if(type==="foto") onChange("fotos",[...(car.fotos||[]),...done]);
    else onChange("videos",[...(car.videos||[]),...done]);
    setUpl(false);setProg(0);
  }
  function rem(type,idx){const k=type==="foto"?"fotos":"videos";onChange(k,(car[k]||[]).filter((_,i)=>i!==idx));}
  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      {!hasSb&&(
        <div style={{background:"#1a1000",border:`1px solid ${C.warning}44`,borderRadius:9,padding:13,color:C.warning,fontSize:12}}>
          ⚠️ Supabase não configurado. Clique em <b>⚙️</b> no topo (somente Proprietário) para configurar e ativar upload de fotos e vídeos.
        </div>
      )}
      {/* FOTOS */}
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:13,padding:20}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <div style={{fontWeight:700,color:C.red,fontSize:12,letterSpacing:1}}>📸 FOTOS ({(car.fotos||[]).length})</div>
          <div>
            <input type="file" ref={pRef} accept="image/*" multiple style={{display:"none"}} onChange={e=>handleUpload(Array.from(e.target.files),"foto")}/>
            <Btn small onClick={()=>pRef.current.click()} disabled={!hasSb||upl}>{upl?`Enviando ${prog}%`:"📷 Adicionar Fotos"}</Btn>
          </div>
        </div>
        {err&&<div style={{color:C.error,fontSize:11,marginBottom:10,padding:"7px 10px",background:"#7F1D1D22",borderRadius:5}}>{err}</div>}
        {upl&&<div style={{marginBottom:12}}><div style={{height:3,background:C.border,borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",width:`${prog}%`,background:C.red,transition:"width .3s"}}/></div></div>}
        {(car.fotos||[]).length===0?(
          <div style={{textAlign:"center",padding:"28px 0",color:C.textDim,fontSize:12}}>Nenhuma foto adicionada</div>
        ):(
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(130px,1fr))",gap:8}}>
            {car.fotos.map((f,i)=>(
              <div key={i} style={{position:"relative",borderRadius:7,overflow:"hidden",border:`1px solid ${C.border}`,aspectRatio:"4/3"}}>
                <img src={f.url} alt={f.name} style={{width:"100%",height:"100%",objectFit:"cover",cursor:"pointer"}} onClick={()=>setLb({items:car.fotos,idx:i})}/>
                <button onClick={()=>rem("foto",i)} style={{position:"absolute",top:3,right:3,background:"#000a",border:"none",color:"#fff",cursor:"pointer",borderRadius:"50%",width:20,height:20,fontSize:11,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
                <div style={{position:"absolute",bottom:0,left:0,right:0,background:"#000a",padding:"2px 5px",fontSize:8,color:"#fff9"}}>{f.uploadedBy} · {new Date(f.uploadedAt).toLocaleDateString("pt-BR")}</div>
              </div>
            ))}
          </div>
        )}
      </div>
      {/* VIDEOS */}
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:13,padding:20}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <div style={{fontWeight:700,color:C.red,fontSize:12,letterSpacing:1}}>🎬 VÍDEOS ({(car.videos||[]).length})</div>
          <div>
            <input type="file" ref={vRef} accept="video/*" multiple style={{display:"none"}} onChange={e=>handleUpload(Array.from(e.target.files),"video")}/>
            <Btn small onClick={()=>vRef.current.click()} disabled={!hasSb||upl}>🎥 Adicionar Vídeos</Btn>
          </div>
        </div>
        {(car.videos||[]).length===0?(
          <div style={{textAlign:"center",padding:"28px 0",color:C.textDim,fontSize:12}}>Nenhum vídeo adicionado</div>
        ):(
          <div style={{display:"flex",flexDirection:"column",gap:9}}>
            {car.videos.map((v,i)=>(
              <div key={i} style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:9,overflow:"hidden"}}>
                <video src={v.url} controls style={{width:"100%",maxHeight:280,display:"block"}}/>
                <div style={{padding:"7px 11px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div style={{fontSize:10,color:C.textMuted}}>{v.name} · {v.uploadedBy} · {new Date(v.uploadedAt).toLocaleDateString("pt-BR")}</div>
                  <button onClick={()=>rem("video",i)} style={{background:"none",border:"none",color:C.error,cursor:"pointer",fontSize:11}}>Remover</button>
                </div>
              </div>
            ))}
          </div>
        )}
      </div>
      {/* NOTES */}
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:11,padding:16}}>
        <Txta label="Observações sobre avarias (registro de entrada)" value={car.mediaObs} onChange={v=>onChange("mediaObs",v)} rows={5} placeholder="Descreva os defeitos observados no momento de entrada do veículo..."/>
      </div>
      {/* LIGHTBOX */}
      {lb&&(
        <div style={{position:"fixed",inset:0,background:"#000e",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={()=>setLb(null)}>
          <img src={lb.items[lb.idx].url} alt="" style={{maxWidth:"90vw",maxHeight:"90vh",objectFit:"contain",borderRadius:7}} onClick={e=>e.stopPropagation()}/>
          <button onClick={()=>setLb(null)} style={{position:"absolute",top:18,right:18,background:"#fff2",border:"none",color:"#fff",cursor:"pointer",fontSize:22,borderRadius:"50%",width:38,height:38}}>✕</button>
          {lb.idx>0&&<button onClick={e=>{e.stopPropagation();setLb(l=>({...l,idx:l.idx-1}));}} style={{position:"absolute",left:18,background:"#fff2",border:"none",color:"#fff",cursor:"pointer",fontSize:28,borderRadius:"50%",width:44,height:44}}>‹</button>}
          {lb.idx<lb.items.length-1&&<button onClick={e=>{e.stopPropagation();setLb(l=>({...l,idx:l.idx+1}));}} style={{position:"absolute",right:18,background:"#fff2",border:"none",color:"#fff",cursor:"pointer",fontSize:28,borderRadius:"50%",width:44,height:44}}>›</button>}
        </div>
      )}
    </div>
  );
}

// ═══ FINANCIAL TAB ══════════════════════════════════════════════
function FinancialTab({car,user,suppliers,onChange,onMarkSold}){
  const [nd,setNd]=useState(""); const [nv,setNv]=useState(""); const [nf,setNf]=useState("");
  const isCons=car.origem==="Consignado";
  const vp=isCons?Number(car.consignadoValor)||0:Number(car.valorPago)||0;
  const lt=Number(car.leilaoTaxas)||0;
  const desp=(car.despesas||[]).reduce((s,d)=>s+(Number(d.valor)||0),0);
  const custo=vp+lt+desp;
  const pv=Number(car.precoVenda)||0; const fipe=Number(car.tabelaFipe)||0; const com=Number(car.comissaoValor)||0;
  const lucro=pv-custo-com; const marg=pv>0?((lucro/pv)*100).toFixed(1):"—"; const dif=fipe>0?pv-fipe:null;
  function addDesp(){if(!nd.trim()||!nv)return;onChange("despesas",[...(car.despesas||[]),{id:Date.now(),desc:nd,valor:nv,fornecedor:nf}]);setNd("");setNv("");setNf("");}
  const kpis=[
    ...(CAN.seeCusto(user.role)?[{l:isCons?"Valor ao Dono":"Valor Pago",v:fmt(vp),col:"#EF4444",i:"💸"}]:[]),
    ...(car.origem==="Leilão"?[{l:"Taxas Leilão",v:fmt(lt),col:"#F59E0B",i:"🔨"}]:[]),
    {l:"Despesas",v:fmt(desp),col:"#F59E0B",i:"🔧"},
    ...(CAN.seeCusto(user.role)?[{l:"Custo Total",v:fmt(custo),col:"#F97316",i:"📊"}]:[]),
    {l:"FIPE",v:fmt(fipe),col:"#8B5CF6",i:"📋"},
    {l:"Preço Venda",v:fmt(pv),col:"#10B981",i:"🏷️"},
    {l:"Comissão",v:fmt(com),col:"#F59E0B",i:"🧑‍💼"},
    ...(CAN.seeCusto(user.role)?[
      {l:"Lucro Líquido",v:fmt(lucro),col:lucro>=0?C.success:C.error,i:lucro>=0?"📈":"📉"},
      {l:"Margem",v:marg!=="—"?`${marg}%`:"—",col:lucro>=0?C.success:C.error,i:"%"},
      {l:"vs FIPE",v:dif!==null?fmt(dif):"—",col:dif!==null?dif>=0?C.success:C.error:C.textMuted,i:"⚖️"},
    ]:[]),
  ];
  return(
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(140px,1fr))",gap:9}}>
        {kpis.map(k=>(
          <div key={k.l} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:11,padding:13}}>
            <div style={{fontSize:17,marginBottom:5}}>{k.i}</div>
            <div style={{fontSize:9,color:C.textMuted,marginBottom:3,letterSpacing:.5,textTransform:"uppercase"}}>{k.l}</div>
            <div style={{fontSize:15,fontWeight:800,color:k.col}}>{k.v}</div>
          </div>
        ))}
      </div>
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:13,padding:20,display:"flex",flexDirection:"column",gap:14}}>
        <div style={{color:C.red,fontWeight:700,fontSize:11,letterSpacing:1}}>DADOS FINANCEIROS</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:12}}>
          {!isCons&&CAN.seeCusto(user.role)&&<Inp label="Valor pago (R$)" value={car.valorPago} onChange={v=>onChange("valorPago",v)} type="number"/>}
          <Inp label="Tabela FIPE (R$)" value={car.tabelaFipe} onChange={v=>onChange("tabelaFipe",v)} type="number"/>
          <Inp label="Preço de venda (R$)" value={car.precoVenda} onChange={v=>onChange("precoVenda",v)} type="number"/>
          <Inp label="Comissão do vendedor (R$)" value={car.comissaoValor} onChange={v=>onChange("comissaoValor",v)} type="number"/>
          <Inp label="Vendedor" value={car.vendedor} onChange={v=>onChange("vendedor",v)} placeholder="Nome"/>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:12}}>
          <Sel label="Forma de Pagamento" value={car.formaPagamento} onChange={v=>onChange("formaPagamento",v)} options={["","À Vista","Financiado","Permuta","Misto"]}/>
          {car.formaPagamento==="Financiado"&&<Inp label="Banco Financiador" value={car.bancoFinanciamento} onChange={v=>onChange("bancoFinanciamento",v)} placeholder="Ex: Santander..."/>}
          <Inp label="Comprador" value={car.comprador} onChange={v=>onChange("comprador",v)}/>
          <Inp label="Telefone do Comprador" value={car.compradorTel} onChange={v=>onChange("compradorTel",v)}/>
        </div>
        {car.status!=="Vendido"&&pv>0&&<Btn onClick={onMarkSold} variant="success" style={{alignSelf:"flex-start"}}>🤝 Registrar Venda</Btn>}
        {car.status==="Vendido"&&car.garantiaAte&&(
          <div style={{background:"#064E3B33",border:`1px solid #10B98155`,borderRadius:7,padding:11,fontSize:12,color:C.success}}>
            ✅ Vendido em {car.dataVenda?new Date(car.dataVenda+"T00:00:00").toLocaleDateString("pt-BR"):"—"} · Garantia 3 meses até {new Date(car.garantiaAte+"T00:00:00").toLocaleDateString("pt-BR")} · Comprador: {car.comprador||"—"}
          </div>
        )}
      </div>
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:13,padding:20}}>
        <div style={{color:C.red,fontWeight:700,fontSize:11,letterSpacing:1,marginBottom:13}}>DESPESAS</div>
        <div style={{display:"flex",gap:7,marginBottom:11,flexWrap:"wrap"}}>
          <input placeholder="Descrição" value={nd} onChange={e=>setNd(e.target.value)} style={{flex:2,minWidth:100,background:"#040406",border:`1px solid ${C.border}`,borderRadius:7,padding:"8px 10px",color:C.text,fontSize:12,fontFamily:"inherit",outline:"none"}}/>
          <input placeholder="R$" value={nv} onChange={e=>setNv(e.target.value)} type="number" style={{flex:1,minWidth:70,background:"#040406",border:`1px solid ${C.border}`,borderRadius:7,padding:"8px 10px",color:C.text,fontSize:12,fontFamily:"inherit",outline:"none"}}/>
          {suppliers.length>0&&(
            <select value={nf} onChange={e=>setNf(e.target.value)} style={{flex:1,minWidth:90,background:"#040406",border:`1px solid ${C.border}`,borderRadius:7,padding:"8px 10px",color:nf?C.text:C.textMuted,fontSize:12,fontFamily:"inherit",outline:"none",cursor:"pointer"}}>
              <option value="">Fornecedor</option>
              {suppliers.map(s=><option key={s.id} value={s.nome} style={{color:C.text,background:C.card}}>{s.nome}</option>)}
            </select>
          )}
          <Btn small onClick={addDesp}>Adicionar</Btn>
        </div>
        {(car.despesas||[]).length===0?<div style={{color:C.textDim,fontSize:12,textAlign:"center",padding:"18px 0"}}>Nenhuma despesa registrada</div>:(
          <>
            {car.despesas.map(d=>(
              <div key={d.id} style={{display:"flex",alignItems:"center",background:C.bg,border:`1px solid ${C.border}`,borderRadius:7,padding:"9px 11px",marginBottom:6}}>
                <div style={{flex:1,fontSize:12,color:C.text}}>{d.desc}{d.fornecedor?` · ${d.fornecedor}`:""}</div>
                <div style={{fontSize:12,fontWeight:700,color:"#F87171",marginRight:11}}>{fmt(d.valor)}</div>
                <button onClick={()=>onChange("despesas",car.despesas.filter(x=>x.id!==d.id))} style={{background:"none",border:"none",color:C.textDim,cursor:"pointer",fontSize:15}}>✕</button>
              </div>
            ))}
            <div style={{textAlign:"right",paddingTop:9,borderTop:`1px solid ${C.border}`,marginTop:5}}>
              <span style={{fontSize:13,fontWeight:800,color:"#F59E0B"}}>Total: {fmt(desp)}</span>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

// ═══ APPROVAL TAB ═══════════════════════════════════════════════
function ApprovalTab({car,user,onApprove,onReject}){
  let total=0,done=0;
  Object.keys(CATS).forEach(k=>{if(car[k])car[k].items.forEach(i=>{total++;if(i.status==="concluído")done++;});});
  const pct=total>0?Math.round((done/total)*100):0;
  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{background:C.card,border:`1px solid ${C.warning}44`,borderRadius:13,padding:22}}>
        <div style={{fontWeight:800,fontSize:17,color:C.warning,marginBottom:14}}>⏳ Veículo Aguardando Aprovação</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:18}}>
          {[{l:"Preparação",v:`${pct}%`,col:pct===100?C.success:C.warning},{l:"Itens OK",v:done,col:C.success},{l:"Pendentes",v:total-done,col:C.error}].map(x=>(
            <div key={x.l} style={{background:C.bg,borderRadius:9,padding:14,textAlign:"center"}}>
              <div style={{fontSize:28,fontWeight:800,color:x.col}}>{x.v}</div>
              <div style={{fontSize:10,color:C.textMuted,marginTop:4}}>{x.l}</div>
            </div>
          ))}
        </div>
        <div style={{display:"flex",gap:10}}>
          <Btn onClick={onApprove} variant="success" style={{flex:1,justifyContent:"center"}}>✅ Aprovar — Pronto para Venda</Btn>
          <Btn onClick={onReject} variant="danger" style={{flex:1,justifyContent:"center"}}>↩️ Devolver para Preparação</Btn>
        </div>
      </div>
    </div>
  );
}

// ═══ SUPPLIERS ══════════════════════════════════════════════════
function SuppliersModal({suppliers,onChange,onClose}){
  const [nome,setNome]=useState(""); const [tipo,setTipo]=useState(FORN_TIPOS[0]); const [tel,setTel]=useState(""); const [obs,setObs]=useState("");
  function add(){if(!nome.trim())return;onChange([...suppliers,{id:Date.now(),nome:nome.trim(),tipo,tel,obs}]);setNome("");setTipo(FORN_TIPOS[0]);setTel("");setObs("");}
  return(
    <Modal title="🏢 Fornecedores" onClose={onClose} width={680}>
      <div style={{display:"flex",flexDirection:"column",gap:18}}>
        <div style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:11,padding:16}}>
          <div style={{color:C.red,fontWeight:700,fontSize:11,letterSpacing:1,marginBottom:13}}>CADASTRAR FORNECEDOR</div>
          <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr",gap:10,marginBottom:10}}>
            <Inp label="Nome" value={nome} onChange={setNome} placeholder="Nome da empresa"/>
            <Sel label="Tipo" value={tipo} onChange={setTipo} options={FORN_TIPOS}/>
            <Inp label="Telefone" value={tel} onChange={setTel} placeholder="(00) 00000-0000"/>
          </div>
          <div style={{display:"flex",gap:10,alignItems:"flex-end"}}>
            <div style={{flex:1}}><Inp label="Observações" value={obs} onChange={setObs} placeholder="Endereço, especialidade..."/></div>
            <Btn onClick={add}>Cadastrar</Btn>
          </div>
        </div>
        {suppliers.length===0?<div style={{textAlign:"center",padding:"18px 0",color:C.textDim}}>Nenhum fornecedor cadastrado</div>:(
          <div style={{display:"flex",flexDirection:"column",gap:7}}>
            {suppliers.map(s=>(
              <div key={s.id} style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:9,padding:"11px 14px",display:"flex",alignItems:"center",gap:11}}>
                <div style={{flex:1}}>
                  <div style={{fontWeight:600,fontSize:13,color:C.text}}>{s.nome}</div>
                  <div style={{fontSize:11,color:C.textMuted}}>{s.tipo}{s.tel?` · ${s.tel}`:""}{s.obs?` · ${s.obs}`:""}</div>
                </div>
                <button onClick={()=>onChange(suppliers.filter(x=>x.id!==s.id))} style={{background:"none",border:"none",color:C.error,cursor:"pointer",fontSize:12}}>Remover</button>
              </div>
            ))}
          </div>
        )}
      </div>
    </Modal>
  );
}

// ═══ LOADING ════════════════════════════════════════════════════
function LoadingScreen(){
  return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{textAlign:"center"}}>
        <img src={LOGO} alt="Premier" style={{width:200,objectFit:"contain",filter:"drop-shadow(0 4px 24px rgba(204,26,26,.4))"}}/>
        <div style={{color:C.textMuted,marginTop:14,fontSize:12,letterSpacing:2}}>Carregando...</div>
      </div>
    </div>
  );
}

// ═══ APP ROOT ════════════════════════════════════════════════════
function App(){
  const [ready,setReady]=useState(false);
  const [user,setUser]=useState(null);
  const [view,setView]=useState("dashboard");
  const [cars,setCars]=useState([]);
  const [suppliers,setSuppliers]=useState([]);
  const [selectedCar,setSelectedCar]=useState(null);
  const [sbConfig,setSbConfig]=useState(null);
  const [showSuppliers,setShowSuppliers]=useState(false);
  const [showSetup,setShowSetup]=useState(false);

  useEffect(()=>{
    const link=document.createElement("link");
    link.href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&display=swap";
    link.rel="stylesheet"; document.head.appendChild(link);
    const style=document.createElement("style");
    style.textContent=`*{box-sizing:border-box;margin:0;padding:0}body{font-family:'DM Sans',system-ui,sans-serif!important;background:#060606}::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:#0F0F0F}::-webkit-scrollbar-thumb{background:#CC1A1A;border-radius:3px}input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}select option{background:#0F0F0F}`;
    document.head.appendChild(style);
    async function load(){
      try{
        const sb=await window.storage.get("premier_sb_v3"); if(sb)setSbConfig(JSON.parse(sb.value));
        const c=await window.storage.get("premier_cars_v3"); if(c)setCars(JSON.parse(c.value));
        const s=await window.storage.get("premier_supp_v3"); if(s)setSuppliers(JSON.parse(s.value));
        const u=await window.storage.get("premier_user_v3"); if(u)setUser(JSON.parse(u.value));
        const setup=await window.storage.get("premier_setup_open"); if(setup)setShowSetup(true);
      }catch{}
      setReady(true);
    }
    load();
  },[]);

  async function saveCars(u){setCars(u);try{await window.storage.set("premier_cars_v3",JSON.stringify(u));}catch{}}
  async function saveSup(u){setSuppliers(u);try{await window.storage.set("premier_supp_v3",JSON.stringify(u));}catch{}}
  async function saveSb(cfg){setSbConfig(cfg);try{await window.storage.set("premier_sb_v3",JSON.stringify(cfg));}catch{}}
  async function login(u){setUser(u);try{await window.storage.set("premier_user_v3",JSON.stringify(u));}catch{}}
  async function logout(){setUser(null);setView("dashboard");try{await window.storage.delete("premier_user_v3");}catch{}}
  async function openSetup(){setShowSetup(true);try{await window.storage.set("premier_setup_open","1");}catch{}}
  async function closeSetup(){setShowSetup(false);try{await window.storage.delete("premier_setup_open");}catch{}}

  if(!ready) return <LoadingScreen/>;
  if(showSetup) return <SetupScreen onSave={cfg=>{saveSb(cfg);closeSetup();}} onBack={closeSetup}/>;
  if(!user) return <LoginScreen onLogin={login}/>;

  if(view==="carDetail"&&selectedCar) return(
    <>
      <CarDetail car={selectedCar} user={user} suppliers={suppliers} sbConfig={sbConfig}
        onBack={()=>{setView("dashboard");setSelectedCar(null);}}
        onSave={u=>{const l=cars.map(c=>c.id===u.id?u:c);saveCars(l);setSelectedCar(u);}}
        onDelete={id=>{saveCars(cars.filter(c=>c.id!==id));setView("dashboard");setSelectedCar(null);}}/>
      {showSuppliers&&<SuppliersModal suppliers={suppliers} onChange={saveSup} onClose={()=>setShowSuppliers(false)}/>}
    </>
  );

  if(view==="addCar") return(
    <AddCarForm car={createCar(Date.now(),user.name)} onBack={()=>setView("dashboard")}
      onSave={car=>{saveCars([...cars,car]);setSelectedCar(car);setView("carDetail");}}/>
  );

  return(
    <>
      <Dashboard cars={cars} suppliers={suppliers} user={user} sbConfig={sbConfig}
        onLogout={logout}
        onSelectCar={car=>{setSelectedCar(car);setView("carDetail");}}
        onAddCar={()=>setView("addCar")}
        onOpenSuppliers={()=>setShowSuppliers(true)}
        onOpenSetup={openSetup}/>
      {showSuppliers&&<SuppliersModal suppliers={suppliers} onChange={saveSup} onClose={()=>setShowSuppliers(false)}/>}
    </>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App/>);
  </script>
</body>
</html>
