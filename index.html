function getSB() {
  return window.supabase.createClient(SB_URL, SB_KEY);
}
async function sbGet(key) {
  try {
    const {
      data,
      error
    } = await getSB().from("premier_data").select("value").eq("key", key).single();
    if (!error && data) return data.value;
  } catch (e) {
    console.error("sbGet", key, e);
  }
  return null;
}
async function sbSet(key, value) {
  try {
    const {
      error
    } = await getSB().from("premier_data").upsert({
      key,
      value,
      updated_at: new Date().toISOString()
    }, {
      onConflict: "key"
    });
    if (error) console.error("sbSet error:", error.message);
  } catch (e) {
    console.error("sbSet exception", e);
  }
}
async function sbUpload(file, carId, type) {
  const ext = (file.name.split(".").pop() || "jpg").toLowerCase();
  const path = `${carId}/${type}-${Date.now()}.${ext}`;
  const sb = getSB();
  const {
    error
  } = await sb.storage.from("premier-media").upload(path, file, {
    upsert: true,
    contentType: file.type
  });
  if (error) throw new Error(error.message);
  const {
    data
  } = sb.storage.from("premier-media").getPublicUrl(path);
  return {
    url: data.publicUrl,
    name: file.name,
    type,
    path,
    uploadedAt: new Date().toISOString()
  };
}
